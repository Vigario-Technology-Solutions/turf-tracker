name: CI

env:
  HUSKY: 0
  CI: true
  # Pinned to match prod (Fedora-class Linux, Node v24.15.0). See
  # package.json `engines.node` for the rationale.
  NODE_VERSION: "24"

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump for release (leave empty to auto-detect from commits)"
        required: false
        type: choice
        options: ["", "major", "minor", "patch"]
        default: ""

# Concurrency: PRs cancel prior runs of the same PR (saves CI time on
# rapid pushes), main pushes and dispatch runs queue serially (don't
# cancel — every commit on main matters, every dispatch is a release
# attempt).
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Default to read-only. The release job escalates per-job.
permissions:
  contents: read

jobs:
  # =========================================================================
  # Gate — quality checks + full-build validation. Runs on every PR, every
  # push to main, and at the start of every release attempt. Under the
  # build-on-prod contract there's no CI-built artifact to ship; production
  # rebuilds from the tagged commit. The gate's job is to make sure the
  # commit builds cleanly before it can ever become a tag. Failing here is
  # cheap; failing on the prod box during deploy is not.
  # =========================================================================
  gate:
    name: Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6
      - name: Verify Node major pins agree
        # NODE_VERSION env (this workflow), .nvmrc, and package.json
        # engines.node must all declare the same Node major. The
        # production host pins to the same major. Drift here would let
        # CI green-light a build that prod can't run.
        run: |
          NVMRC_MAJOR=$(sed -E 's/^[^0-9]*([0-9]+).*/\1/' .nvmrc)
          ENGINES_MAJOR=$(node -p "require('./package.json').engines.node.match(/\d+/)[0]")
          ENV_VERSION="${{ env.NODE_VERSION }}"
          echo "Node major check: NODE_VERSION=$ENV_VERSION  .nvmrc=$NVMRC_MAJOR  engines.node=$ENGINES_MAJOR"
          if [ "$NVMRC_MAJOR" != "$ENV_VERSION" ] || [ "$ENGINES_MAJOR" != "$ENV_VERSION" ]; then
            echo "::error::Node major mismatch — bump NODE_VERSION env (release.yml), .nvmrc, and package.json engines.node together."
            exit 1
          fi
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      # Cache key derived from package.json's deps fields ONLY, not the
      # full lockfile. The release path rewrites package-lock.json's root
      # `version` on every run, so a key based on
      # `hashFiles('**/package-lock.json')` (what setup-node's
      # `cache: "npm"` shorthand uses) rotates every release and
      # accumulates one stale cache per run. Hashing only the deps subtree
      # means the key is stable until you actually change a dep.
      - name: Compute npm cache key
        id: cache-key
        run: |
          HASH=$(jq -S '{dependencies,devDependencies,optionalDependencies,peerDependencies}' package.json | sha256sum | cut -c1-16)
          echo "key=npm-${{ runner.os }}-node${{ env.NODE_VERSION }}-${HASH}" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ steps.cache-key.outputs.key }}
          restore-keys: |
            npm-${{ runner.os }}-node${{ env.NODE_VERSION }}-
      - run: npm ci --prefer-offline
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format
      - run: npm test
      - name: Validate build
        # The build-on-prod contract makes the build the production
        # path: prod re-runs `npm run build` on each deploy. A broken
        # build at the tagged commit means a broken deploy, so the
        # gate has to catch it here. Build outputs are discarded —
        # they're not the artifact, the tagged source is.
        #
        # NEXT_PUBLIC_* values are baked into the client bundle by next
        # build; their absence at build time silently degrades the
        # client (caught by check:public-env, which fails the build
        # loudly if any required NEXT_PUBLIC_* is empty).
        #
        # Sentry sourcemap upload secrets (SENTRY_AUTH_TOKEN / _ORG /
        # _PROJECT) are deliberately NOT set in the gate. Under the
        # build-on-prod contract, sourcemap upload happens when prod
        # builds the release for deploy, with prod's credentials.
        # Setting them here would (a) upload phantom releases on every
        # PR, (b) duplicate the upload prod will do anyway. The Sentry
        # plugin warns when these are absent but doesn't fail the build.
        run: npm run build
        env:
          # Better-Auth's library-level default-secret check fires
          # during `next build` (NODE_ENV=production triggers it). The
          # build never reads BETTER_AUTH_SECRET at runtime; this just
          # satisfies the module-load assertion.
          BETTER_AUTH_SECRET: ci-build-placeholder-not-used-at-runtime
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}

  # =========================================================================
  # Release — bumps version, generates changelog, tags, creates the GitHub
  # Release. Only runs on workflow_dispatch; the gate is the sole entry
  # point for PR / push validation. The production deploy listens for
  # `release.published` and pulls the tagged commit; the Release itself
  # carries no asset under the build-on-prod contract (the source repo +
  # tag IS the deliverable).
  # =========================================================================
  release:
    name: Release
    needs: gate
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine next version
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          if [ -n "${{ inputs.bump }}" ]; then
            TAG=$(git-cliff --bump ${{ inputs.bump }} --bumped-version)
          else
            TAG=$(git-cliff --bumped-version)
          fi
          BARE="${TAG#v}"
          if [ "$BARE" = "$CURRENT" ]; then
            echo "::warning::No version change detected (already at $CURRENT). Skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$BARE" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Next version: $TAG (current: $CURRENT)"

          # Defend against the "previous run failed mid-flight, tag was
          # pushed but workflow never finished" case. package.json's
          # CURRENT may not reflect what's actually tagged in git.
          if git rev-parse --verify "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists in git. A previous release run probably partially completed. Manually delete the tag (git push --delete origin $TAG) or bump past it before retrying."
            exit 1
          fi

      - name: Bump package.json
        if: steps.version.outputs.skip != 'true'
        run: npm version ${{ steps.version.outputs.version }} --no-git-tag-version

      - name: Generate changelog
        if: steps.version.outputs.skip != 'true'
        run: |
          BUMP_ARG="${{ inputs.bump }}"
          git-cliff --bump ${BUMP_ARG:+$BUMP_ARG} --output CHANGELOG.md
          git-cliff --bump ${BUMP_ARG:+$BUMP_ARG} --unreleased --strip header --output RELEASE_NOTES.md

      - name: Commit, tag and push
        if: steps.version.outputs.skip != 'true'
        run: |
          git add package.json package-lock.json CHANGELOG.md
          git commit -m "chore(release): ${{ steps.version.outputs.tag }}"
          git tag ${{ steps.version.outputs.tag }}
          git push origin main --follow-tags

      # Single-step publish under build-on-prod — no asset upload, no
      # SHA256SUMS, no draft → published dance. The Release exists
      # purely as the trigger surface for production's deploy webhook
      # (`release.published`), with the changelog as the body. The
      # tagged commit IS the artifact; production's deploy script
      # `git fetch && git checkout ${tag}` to pick it up.
      - name: Create GitHub Release
        if: steps.version.outputs.skip != 'true'
        uses: softprops/action-gh-release@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: RELEASE_NOTES.md

      - name: Generate job summary
        if: always()
        run: |
          VERSION=${{ steps.version.outputs.version }}
          TAG=${{ steps.version.outputs.tag }}
          SKIP=${{ steps.version.outputs.skip }}
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$SKIP" = "true" ]; then
            echo "> **Skipped** — no version change detected (already at v${VERSION})" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| **Version** | v${VERSION} |" >> $GITHUB_STEP_SUMMARY
            echo "| **Tag** | \`${TAG}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| **Bump** | ${{ inputs.bump || 'auto-detected' }} |" >> $GITHUB_STEP_SUMMARY
          fi
