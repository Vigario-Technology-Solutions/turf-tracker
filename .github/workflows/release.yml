name: Release

env:
  HUSKY: 0
  CI: true
  # Pinned to match prod (Fedora 43, Node v24.15.0). See package.json
  # `engines.node` for the rationale.
  NODE_VERSION: "24"

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump (leave empty to auto-detect from commits)"
        required: false
        type: choice
        options: ["", "major", "minor", "patch"]
        default: ""

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # =========================================================================
  # Gate — every quality check that should block a release. Tests, lint,
  # typecheck. Solo-dev + main-only means there's no separate "CI on push"
  # job; this gate is the single backstop for "did I forget to test before
  # tagging."
  # =========================================================================
  gate:
    name: Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_ADMIN_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/turf_tracker_test

    steps:
      - uses: actions/checkout@v6
      - name: Verify Node major pins agree
        # NODE_VERSION env (this workflow), .nvmrc, and package.json
        # engines.node must all declare the same Node major.
        # MANIFEST.nodeVersion is sourced from engines.node and
        # BUILD_INFO.nodeVersion records the runner's actual node
        # (driven by NODE_VERSION env via setup-node) — drift between
        # the two would ship an artifact whose contract claims one
        # major and whose runtime built it on another.
        run: |
          NVMRC_MAJOR=$(sed -E 's/^[^0-9]*([0-9]+).*/\1/' .nvmrc)
          ENGINES_MAJOR=$(node -p "require('./package.json').engines.node.match(/\d+/)[0]")
          ENV_VERSION="${{ env.NODE_VERSION }}"
          echo "Node major check: NODE_VERSION=$ENV_VERSION  .nvmrc=$NVMRC_MAJOR  engines.node=$ENGINES_MAJOR"
          if [ "$NVMRC_MAJOR" != "$ENV_VERSION" ] || [ "$ENGINES_MAJOR" != "$ENV_VERSION" ]; then
            echo "::error::Node major mismatch — bump NODE_VERSION env (release.yml), .nvmrc, and package.json engines.node together."
            exit 1
          fi
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      # Cache key derived from package.json's deps fields ONLY, not
      # the full lockfile. The Release workflow rewrites
      # package-lock.json's root `version` on every run, so a key
      # based on `hashFiles('**/package-lock.json')` (what setup-node's
      # `cache: "npm"` shorthand uses) rotates every release and
      # accumulates stale caches. Hashing only the deps subtree means
      # the key is stable until you actually change a dep.
      - name: Compute npm cache key
        id: cache-key
        run: |
          HASH=$(jq -S '{dependencies,devDependencies,optionalDependencies,peerDependencies}' package.json | sha256sum | cut -c1-16)
          echo "key=npm-${{ runner.os }}-node${{ env.NODE_VERSION }}-${HASH}" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ steps.cache-key.outputs.key }}
          restore-keys: |
            npm-${{ runner.os }}-node${{ env.NODE_VERSION }}-
      - run: npm ci --prefer-offline
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format
      - run: npm test

  # =========================================================================
  # Release — depends on gate. Bumps version, builds the standalone tar,
  # tags + pushes, creates the GH Release with the artifact attached.
  # The artifact at this point is what prod will swap to on the
  # `release.published` webhook.
  # =========================================================================
  release:
    name: Release
    needs: gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      # See the Gate job for the rationale on hashing deps-only.
      - name: Compute npm cache key
        id: cache-key
        run: |
          HASH=$(jq -S '{dependencies,devDependencies,optionalDependencies,peerDependencies}' package.json | sha256sum | cut -c1-16)
          echo "key=npm-${{ runner.os }}-node${{ env.NODE_VERSION }}-${HASH}" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ steps.cache-key.outputs.key }}
          restore-keys: |
            npm-${{ runner.os }}-node${{ env.NODE_VERSION }}-

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine next version
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          if [ -n "${{ inputs.bump }}" ]; then
            TAG=$(git-cliff --bump ${{ inputs.bump }} --bumped-version)
          else
            TAG=$(git-cliff --bumped-version)
          fi
          BARE="${TAG#v}"
          if [ "$BARE" = "$CURRENT" ]; then
            echo "::warning::No version change detected (already at $CURRENT). Skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$BARE" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Next version: $TAG (current: $CURRENT)"

          # Defend against the "previous run failed mid-flight, tag was
          # pushed but workflow never finished" case. package.json's
          # CURRENT may not reflect what's actually tagged in git.
          if git rev-parse --verify "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists in git. A previous release run probably partially completed. Manually delete the tag (git push --delete origin $TAG) or bump past it before retrying."
            exit 1
          fi

      - name: Bump package.json
        if: steps.version.outputs.skip != 'true'
        run: npm version ${{ steps.version.outputs.version }} --no-git-tag-version

      - name: Build
        if: steps.version.outputs.skip != 'true'
        # `npm run build` chains `prebuild` → `next build` → `serwist build`.
        # `prebuild` runs `check:public-env` (fails the build if any
        # NEXT_PUBLIC_* referenced in src/ is missing — Next would
        # otherwise inline `undefined` and silently break features at
        # runtime) followed by `build:seed` (esbuild-bundles
        # prisma/seed/index.ts → bin/seed.js so prod's v2 standalone
        # can run the seed via plain `node` without tsx) and `build:cli`
        # (esbuild-bundles src/cli/index.ts → bin/turf.js + emits
        # bin/cli-manifest.json with the introspected subcommand list).
        # build:cli runs its own `--check` smoke test to catch cold-start
        # import failures at build time.
        run: npm run build
        env:
          # Better-Auth's library-level default-secret check fires during
          # `next build` (NODE_ENV=production triggers it). The bundle
          # itself reads BETTER_AUTH_SECRET from process.env at runtime,
          # so this build-time value is just to satisfy the library's
          # module-load assertion. Real runtime secret comes from the
          # prod server's env, not from the bundled artifact.
          BETTER_AUTH_SECRET: release-build-placeholder-not-used-at-runtime
          # BETTER_AUTH_URL is intentionally NOT set at build time — every
          # call site reads it from process.env at runtime, so the bundle
          # is environment-agnostic. Better-Auth emits a "Base URL could
          # not be determined" warning during build; harmless because the
          # real URL is set in prod's env at server start.
          #
          # Sentry — build-time only. NEXT_PUBLIC_SENTRY_DSN is inlined
          # into the client bundle at build time (Next replaces
          # `process.env.NEXT_PUBLIC_*` references with literals during
          # the bundle pass). SENTRY_DSN here is harmless extra exposure
          # to the build; the actual server-runtime read is from prod's
          # env at start. SENTRY_ORG / SENTRY_PROJECT / SENTRY_AUTH_TOKEN
          # are read by withSentryConfig to upload source maps so
          # production stack traces resolve back to readable TS. Without
          # these the build still succeeds but stack traces in Sentry
          # stay minified. All optional — Sentry init is a no-op when
          # DSNs are unset.
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Package standalone
        if: steps.version.outputs.skip != 'true'
        run: |
          # Merge required runtime files into the standalone bundle.
          # The tar must be self-contained so prod can swap to it
          # without any further `npm install`.
          #
          # `cp -rT` (treat dest as a file, not a dir to nest into) so
          # this works whether the target already exists or not. Next 16
          # pre-creates .next/standalone/public/ during `next build`;
          # without -T, the source public/ would nest as
          # .next/standalone/public/public/, hiding serwist's sw.js
          # (written to source public/ AFTER next build) from the
          # tarball root. Same defensive treatment for .next/static.
          cp -rT public .next/standalone/public
          cp -rT .next/static .next/standalone/.next/static

          # Schema + migration files + generated Prisma client. Prod's
          # globally-installed prisma reads these to apply migrations
          # via the v2 contract's `prisma migrate deploy` preStartCommand.
          # The prisma CLI itself is NOT shipped — see docs/deployment.md
          # for rationale.
          mkdir -p .next/standalone/generated
          cp -r generated/prisma .next/standalone/generated/
          cp -r prisma .next/standalone/prisma

          # prisma.config.ts at tar root — Prisma v7+ reads it from cwd
          # to find the schema and resolve DATABASE_URL. Required by
          # `prisma migrate deploy`.
          cp prisma.config.ts .next/standalone/prisma.config.ts

          # Custom Next entrypoint — graceful SIGTERM/SIGINT handling
          # (drain → prisma → sentry → exit 0). MANIFEST.startCommand
          # points prod at this instead of the auto-generated server.js.
          # See docs/deployment.md "Shutdown contract".
          cp server.mjs .next/standalone/server.mjs

          # Pre-compiled seed (built earlier). Prod runs this via
          # MANIFEST.preStartCommands right after `prisma migrate
          # deploy` so reference-table upserts always land alongside
          # the schema change that introduced them.
          mkdir -p .next/standalone/bin
          cp bin/seed.js .next/standalone/bin/seed.js

          # Pre-compiled CLI (built earlier). Operators invoke it as
          # `node bin/turf.js <subcommand>` from the deployed release
          # dir. cli-manifest.json carries the introspected subcommand
          # list — folded into MANIFEST.cli below so the tar advertises
          # what the binary actually registers.
          cp bin/turf.js .next/standalone/bin/turf.js
          cp bin/cli-manifest.json .next/standalone/bin/cli-manifest.json

          # .env.example shipped so the first-time deploy path can read
          # the required-env placeholder list without needing the repo.
          cp .env.example .next/standalone/.env.example

          # BUILD_INFO so prod can verify Node + glibc + arch match
          # before swap. os/arch/glibcVersion turn the "forward-compatible
          # family" assumption (Ubuntu 24.04 → Fedora 43) into a
          # checkable invariant — prod refuses to swap if its glibc is
          # older than what built the artifact. Built via jq to avoid
          # YAML-heredoc indentation leaking into the JSON.
          jq -n \
            --arg tag "${{ steps.version.outputs.tag }}" \
            --arg commit "$(git rev-parse HEAD)" \
            --arg buildTime "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg nodeVersion "$(node --version)" \
            --arg os "$(. /etc/os-release && echo "$ID-$VERSION_ID")" \
            --arg arch "$(uname -m)" \
            --arg glibcVersion "$(ldd --version | head -1 | awk '{print $NF}')" \
            --arg assetName "turf-tracker-${{ steps.version.outputs.tag }}.tar.gz" \
            '{tag: $tag, commit: $commit, buildTime: $buildTime, nodeVersion: $nodeVersion, os: $os, arch: $arch, glibcVersion: $glibcVersion, assetName: $assetName}' \
            > .next/standalone/BUILD_INFO

          # MANIFEST — declarative deploy contract. Prod reads this
          # to know how to start the bundle, what env it requires,
          # and which pre-start commands to run. Decouples the source
          # repo from prod's deploy script — bumping the start command
          # or required env happens here, not by editing prod's
          # systemd unit. schemaVersion lets prod refuse unknown
          # versions instead of guessing.
          # schemaVersion 2: preStartCommands uses prod's PATH-resolved
          # prisma (not a bundled binary). requiredTools declares what
          # prod must have installed for preStartCommands to succeed.
          #
          # prismaVersion pinned to root package.json's prisma version
          # so source intent is explicit; prod's preflight does
          # major-match comparison.
          # nodeVersion extracted from package.json engines.node — the
          # bare major digit per the contract. Same source as .nvmrc /
          # NODE_VERSION env above.
          # requiredEnv read from src/lib/required-env.json — the same
          # file src/lib/runtime-config.ts imports for its presence
          # check, so what prod's MANIFEST advertises and what the app
          # validates at startup stay in lockstep.
          # cli pulled from bin/cli-manifest.json (emitted by
          # `npm run build:cli`) so the subcommand list stays auto-
          # synced with what the binary actually registers.
          PRISMA_VERSION=$(node -p "require('./package.json').devDependencies.prisma")
          NODE_MAJOR=$(node -p "require('./package.json').engines.node.match(/\d+/)[0]")
          jq -n \
            --arg tag "${{ steps.version.outputs.tag }}" \
            --arg prismaVersion "$PRISMA_VERSION" \
            --arg nodeMajor "$NODE_MAJOR" \
            --slurpfile requiredEnv src/lib/required-env.json \
            --slurpfile cli bin/cli-manifest.json \
            '{
              schemaVersion: 2,
              tag: $tag,
              startCommand: "node server.mjs",
              preStartCommands: ["prisma migrate deploy", "node bin/seed.js"],
              port: 3000,
              healthCheckPath: "/api/health",
              requiredEnv: $requiredEnv[0],
              optionalEnv: [
                "CIMIS_API_KEY",
                "SMTP_HOST",
                "SMTP_PORT",
                "SMTP_FROM",
                "SMTP_FROM_NAME",
                "SMTP_REPLY_TO",
                "SENTRY_DSN"
              ],
              nodeVersion: $nodeMajor,
              requiredTools: {
                prisma: $prismaVersion
              },
              cli: $cli[0]
            }' \
            > .next/standalone/MANIFEST

          tar -czf turf-tracker-${{ steps.version.outputs.tag }}.tar.gz -C .next/standalone .

      - name: Compute SHA256SUMS
        if: steps.version.outputs.skip != 'true'
        run: |
          sha256sum turf-tracker-${{ steps.version.outputs.tag }}.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: Generate changelog
        if: steps.version.outputs.skip != 'true'
        run: |
          BUMP_ARG="${{ inputs.bump }}"
          git-cliff --bump ${BUMP_ARG:+$BUMP_ARG} --output CHANGELOG.md
          git-cliff --bump ${BUMP_ARG:+$BUMP_ARG} --unreleased --strip header --output RELEASE_NOTES.md

      - name: Commit, tag and push
        if: steps.version.outputs.skip != 'true'
        run: |
          git add package.json package-lock.json CHANGELOG.md
          git commit -m "chore(release): ${{ steps.version.outputs.tag }}"
          git tag ${{ steps.version.outputs.tag }}
          git push origin main --follow-tags

      # Two-step publish: create as draft with all assets attached,
      # then flip to published. Guarantees the `release.published`
      # webhook only fires once both files are uploaded — prevents the
      # race where prod fetches before SHA256SUMS lands.
      - name: Create GitHub Release (draft)
        if: steps.version.outputs.skip != 'true'
        uses: softprops/action-gh-release@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: RELEASE_NOTES.md
          draft: true
          files: |
            turf-tracker-${{ steps.version.outputs.tag }}.tar.gz
            SHA256SUMS

      - name: Publish Release
        if: steps.version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit ${{ steps.version.outputs.tag }} --draft=false

      - name: Generate job summary
        if: always()
        run: |
          VERSION=${{ steps.version.outputs.version }}
          TAG=${{ steps.version.outputs.tag }}
          SKIP=${{ steps.version.outputs.skip }}
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$SKIP" = "true" ]; then
            echo "> **Skipped** — no version change detected (already at v${VERSION})" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| **Version** | v${VERSION} |" >> $GITHUB_STEP_SUMMARY
            echo "| **Tag** | \`${TAG}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| **Bump** | ${{ inputs.bump || 'auto-detected' }} |" >> $GITHUB_STEP_SUMMARY
          fi
