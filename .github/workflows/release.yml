name: CI

env:
  HUSKY: 0
  CI: true
  # Node major. Five places have to declare it: this env var, .nvmrc,
  # package.json#engines.node, the spec's `Requires: nodejs<N>`, and
  # the unit's ExecStart=/usr/bin/node-<N>. The gate's "Verify Node
  # major pins agree" step enforces the first three; the spec and
  # unit have to be edited manually in lockstep when bumping.
  NODE_VERSION: "24"
  PKG_NAME: turf-tracker

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump for release (leave empty to auto-detect from commits)"
        required: false
        type: choice
        options: ["", "major", "minor", "patch"]
        default: ""

# Concurrency: PRs cancel prior runs of the same PR (saves CI time on
# rapid pushes), main pushes and dispatch runs queue serially (don't
# cancel — every commit on main matters, every dispatch is a release
# attempt).
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Default to read-only. The release job escalates per-job.
permissions:
  contents: read

jobs:
  # =========================================================================
  # Gate — quality checks + full-build validation. Runs on every PR, every
  # push to main, and at the start of every release attempt. Failure here
  # blocks a release attempt from ever invoking the rpmbuild path.
  # =========================================================================
  gate:
    name: Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Postgres-17 service for the integration-harness rig. tests/rig.test.ts
    # exercises this on every gate run — drops + recreates
    # turf_tracker_test, db push the current schema, db seed lookups,
    # then asserts the lookups landed and that the transaction-rolling
    # test() wrapper actually rolls back. Catches schema/seed/migration
    # drift that pure-logic tests can't see. Future DB-backed tests
    # (rules-engine against real Areas + SoilTests, etc.) reuse the
    # same harness via tests/helpers/db.ts.
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # ADMIN_DATABASE_URL connects to `postgres` (the default DB) so
      # globalSetup can DROP/CREATE the test DB. TEST_DATABASE_URL is
      # the one vitest hands to Prisma. See tests/helpers/setup.ts.
      TEST_ADMIN_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/turf_tracker_test

    steps:
      - uses: actions/checkout@v6
      - name: Verify Node major pins agree
        # NODE_VERSION env (this workflow), .nvmrc, and package.json
        # engines.node must all declare the same Node major. The
        # production RPM's `Requires: nodejs24` pins this major too
        # — drift here would let CI green-light a build prod won't
        # accept.
        run: |
          NVMRC_MAJOR=$(sed -E 's/^[^0-9]*([0-9]+).*/\1/' .nvmrc)
          ENGINES_MAJOR=$(node -p "require('./package.json').engines.node.match(/\d+/)[0]")
          ENV_VERSION="${{ env.NODE_VERSION }}"
          echo "Node major check: NODE_VERSION=$ENV_VERSION  .nvmrc=$NVMRC_MAJOR  engines.node=$ENGINES_MAJOR"
          if [ "$NVMRC_MAJOR" != "$ENV_VERSION" ] || [ "$ENGINES_MAJOR" != "$ENV_VERSION" ]; then
            echo "::error::Node major mismatch — bump NODE_VERSION env (release.yml), .nvmrc, and package.json engines.node together."
            exit 1
          fi
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      # Cache key derived from package.json's deps fields ONLY, not the
      # full lockfile. The release path rewrites package-lock.json's
      # root `version` on every run, so a key based on
      # `hashFiles('**/package-lock.json')` would rotate every release
      # and accumulate one stale cache per run.
      - name: Compute npm cache key
        id: cache-key
        run: |
          HASH=$(jq -S '{dependencies,devDependencies,optionalDependencies,peerDependencies}' package.json | sha256sum | cut -c1-16)
          echo "key=npm-${{ runner.os }}-node${{ env.NODE_VERSION }}-${HASH}" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ steps.cache-key.outputs.key }}
          restore-keys: |
            npm-${{ runner.os }}-node${{ env.NODE_VERSION }}-
      - run: npm ci --prefer-offline
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format
      - run: npm test
      - name: Validate build
        # Under the RPM-as-artifact model, the gate's build is a sanity
        # check on ubuntu-latest — the load-bearing build happens
        # later inside `rpmbuild -ba` on the self-hosted Fedora runner
        # (so native bindings match prod glibc). If the gate's ubuntu
        # build fails, the Fedora rpmbuild won't pass either. Cheaper
        # to fail here.
        run: npm run build
        env:
          # Better-Auth's library-level default-secret check fires
          # during `next build` (NODE_ENV=production triggers it). The
          # build never reads BETTER_AUTH_SECRET at runtime; this just
          # satisfies the module-load assertion.
          BETTER_AUTH_SECRET: ci-build-placeholder-not-used-at-runtime
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}

  # =========================================================================
  # Release — bumps version, generates changelog, tags, builds + signs the
  # RPM on the self-hosted runner (running on the prod host itself),
  # publishes to /srv/dnf-repo-public/, attaches the signed RPM to the
  # GitHub Release.
  #
  # turf-tracker is a *public* package — it goes to the WAN-facing repo
  # served at https://repo.tylervigario.com/, not the LAN-only
  # http://repo.lan/.
  #
  # Signing model: github-runner has zero key material. It calls
  # `sudo /usr/bin/rpmsign --addsign <rpm>` via a narrow sudoers rule;
  # the actual signing runs as root with /root/.rpmmacros bound to the
  # public-signer subkey on /etc/server-admin/gnupg/. (Operator-side
  # config — the macros binding selects which subkey signs, not anything
  # the workflow controls.)
  #
  # Runs on workflow_dispatch only. Consumers pick up the new RPM via
  # `sudo dnf --refresh upgrade turf-tracker`.
  # =========================================================================
  release:
    name: Release
    needs: gate
    if: github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, fedora-43]
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install git-cliff
        run: |
          curl -sSL -o /tmp/git-cliff.tar.gz \
            https://github.com/orhun/git-cliff/releases/download/v2.6.1/git-cliff-2.6.1-x86_64-unknown-linux-gnu.tar.gz
          tar xzf /tmp/git-cliff.tar.gz -C /tmp
          # /usr/local/bin is system-owned and the runner user can't
          # write to it. Install under the runner's own .local/bin and
          # prepend to $GITHUB_PATH so subsequent steps see it.
          mkdir -p "$HOME/.local/bin"
          install -m 0755 /tmp/git-cliff-*/git-cliff "$HOME/.local/bin/git-cliff"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/git-cliff" --version

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Determine next version
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          if [ -n "${{ inputs.bump }}" ]; then
            # Explicit operator bump: compute directly from package.json,
            # bypassing git-cliff entirely. `git-cliff --bump <type>
            # --bumped-version` respects cliff.toml's commit-type filter
            # — turf's six-type config skips chore/docs/test, so a
            # window of chore-only commits since the last tag returns
            # the unchanged current version even with --bump passed.
            # That makes the operator-override affordance silently inert
            # for forcing a release of a chore-only window (the exact
            # case the workflow's `bump` input is documented for).
            # Compute the bump directly instead so the operator
            # contract holds. git-cliff stays load-bearing for changelog
            # generation in the later step.
            TAG=v$(node -e "
              const [maj, min, pat] = require('./package.json').version.split('.').map(Number);
              const t = process.argv[1];
              const v = t === 'major' ? [maj + 1, 0, 0]
                      : t === 'minor' ? [maj, min + 1, 0]
                      : [maj, min, pat + 1];
              process.stdout.write(v.join('.'));
            " "${{ inputs.bump }}")
          else
            # Auto-detect from commits via git-cliff. Respects
            # cliff.toml's type filter — returns the unchanged version
            # if no bumpable (feat / fix / refactor) commit landed since
            # the last tag, which triggers the skip path below.
            TAG=$(git-cliff --bumped-version)
          fi
          BARE="${TAG#v}"
          echo "version=$BARE" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Next version: $TAG (current: $CURRENT)"

          if [ "$BARE" = "$CURRENT" ]; then
            echo "::warning::No version change detected (already at $CURRENT). Skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

          # Tag-exists guard only runs on the genuinely-bumping path
          # (the skip branch above exits 0 before reaching here).
          # Defends against the failure mode where a previous release
          # run partially completed: package.json bumped + tagged +
          # pushed but the workflow died before publish / gh release
          # create. Re-running lands here with the failed tag still in
          # git; surface that explicitly instead of failing later in
          # the chain with less context.
          if git rev-parse --verify "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists in git. A previous release run probably partially completed. Manually delete the tag (git push --delete origin $TAG) or bump past it before retrying."
            exit 1
          fi

      - name: Bump package.json
        if: steps.version.outputs.skip != 'true'
        run: npm version ${{ steps.version.outputs.version }} --no-git-tag-version

      - name: Generate changelog
        if: steps.version.outputs.skip != 'true'
        run: |
          BUMP_ARG="${{ inputs.bump }}"
          git-cliff --bump ${BUMP_ARG:+$BUMP_ARG} --output CHANGELOG.md
          git-cliff --bump ${BUMP_ARG:+$BUMP_ARG} --unreleased --strip header --output RELEASE_NOTES.md

      - name: Commit, tag and push
        if: steps.version.outputs.skip != 'true'
        run: |
          git add package.json package-lock.json CHANGELOG.md
          git commit -m "chore(release): ${{ steps.version.outputs.tag }}"
          # Annotated tag (-a) — required for `git push --follow-tags`
          # to actually push it. Lightweight tags are silently skipped
          # by --follow-tags, which would leave the commit on main and
          # the tag nowhere (and dnf would have nothing to point a
          # rollback at, since rollbacks index by git tag).
          git tag -a ${{ steps.version.outputs.tag }} -m "Release ${{ steps.version.outputs.tag }}"
          git push origin main --follow-tags

      # ---- RPM build ----
      #
      # Build under $RUNNER_TEMP/rpmbuild, not $GITHUB_WORKSPACE/rpmbuild
      # or $HOME/rpmbuild. RUNNER_TEMP is GitHub Actions' documented
      # per-job scratch dir, emptied at the start and end of every job —
      # hermetic across runs without any cleanup step. Crucially it sits
      # outside $GITHUB_WORKSPACE, so the actions/checkout copy of the
      # repo (with its own package-lock.json one directory above the
      # rpmbuild BUILD/<name>-<ver>/ tree) can't confuse Turbopack's
      # project-root walker into resolving to the outer tree and
      # emitting mis-chunked output. Earlier releases of the reference
      # repo used $GITHUB_WORKSPACE/rpmbuild and the resulting builds
      # shipped broken instrumentation-hook chunks.
      - name: Prepare rpmbuild tree
        if: steps.version.outputs.skip != 'true'
        run: |
          mkdir -p "$RUNNER_TEMP"/rpmbuild/{SOURCES,SPECS,BUILD,RPMS,SRPMS}
          VERSION="${{ steps.version.outputs.version }}"
          git archive --prefix="${PKG_NAME}-${VERSION}/" --format=tar.gz \
              -o "$RUNNER_TEMP/rpmbuild/SOURCES/${PKG_NAME}-${VERSION}.tar.gz" HEAD
          # Source1 (sysusers.d snippet) — referenced by %{SOURCE1} in
          # the spec for %sysusers_create_package. rpmbuild expects it
          # at SOURCES/<name>; the spec's Source1: declaration is a
          # bare filename so rpm resolves it relative to SOURCES/.
          cp packaging/${PKG_NAME}.sysusers \
              "$RUNNER_TEMP/rpmbuild/SOURCES/${PKG_NAME}.sysusers"

      - name: rpmbuild -ba
        if: steps.version.outputs.skip != 'true'
        env:
          # Sentry source-map upload trio. Read by withSentryConfig in
          # next.config.ts during `next build` (which the spec's %build
          # invokes via `npm run build`). Without these, the upload
          # silently no-ops and prod stack traces stay minified.
          #
          # NEXT_PUBLIC_SENTRY_DSN is intentionally NOT passed: the
          # spec's %build does `export NEXT_PUBLIC_SENTRY_DSN=` so
          # client-side Sentry init no-ops. Server-side DSN is set
          # per-host at runtime via /etc/sysconfig/turf-tracker.
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          rpmbuild -ba \
            --define "_version ${{ steps.version.outputs.version }}" \
            --define "_topdir $RUNNER_TEMP/rpmbuild" \
            packaging/${PKG_NAME}.spec

      - name: Locate built RPM
        id: rpm
        if: steps.version.outputs.skip != 'true'
        run: |
          # RUNNER_TEMP is empty at the start of every job, so a glob
          # on ${PKG_NAME}-${VERSION}-*.rpm resolves to exactly one
          # file. No find, no scan.
          VERSION="${{ steps.version.outputs.version }}"
          RPM=$(echo "$RUNNER_TEMP"/rpmbuild/RPMS/x86_64/${PKG_NAME}-${VERSION}-*.rpm)
          if [ ! -f "$RPM" ]; then
            echo "::error::expected RPM not found at $RPM"
            ls -la "$RUNNER_TEMP/rpmbuild/RPMS/x86_64/" || :
            exit 1
          fi
          echo "Built: $RPM"
          rpm -qpi "$RPM"
          echo "path=$RPM" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$RPM")" >> "$GITHUB_OUTPUT"

      # ---- Sign ----
      - name: Sign RPM
        if: steps.version.outputs.skip != 'true'
        run: |
          # Sign via sudo: github-runner has a narrow sudoers rule
          # (/etc/sudoers.d/github-runner-rpmsign) allowing
          # `/usr/bin/rpmsign --addsign` on paths under
          # /var/lib/github-runner/runner/_work/_temp/rpmbuild/RPMS/x86_64/*.rpm.
          # Actual signing runs as root, which reads /root/.rpmmacros
          # (binds to the public-signer subkey on /etc/server-admin/gnupg
          # for this repo's workflow — the two subkeys are cross-signed by
          # the master, so verification through RPM-GPG-KEY-server-admin
          # works for both).
          # No signing-key material lives in this runner's keyring or in
          # any GitHub secret — compromise scope of github-runner is "can
          # sign an RPM at the sudoers-allowed path," not "can take the
          # subkey elsewhere."
          sudo /usr/bin/rpmsign --addsign "${{ steps.rpm.outputs.path }}"
          rpm -K "${{ steps.rpm.outputs.path }}"

      # ---- Publish to /srv/dnf-repo-public/ (WAN, https://repo.tylervigario.com/) ----
      - name: Publish RPM to public dnf repo
        if: steps.version.outputs.skip != 'true'
        run: |
          # github-runner is in the apache group; /srv/dnf-repo-public/ is
          # g+ws apache, so the cp + createrepo_c run without sudo. fcontext
          # policy assigns httpd_sys_content_t to anything under that path;
          # restorecon applies it. turf-tracker is a public package — it
          # publishes to the WAN-facing tree served at
          # https://repo.tylervigario.com/, not the LAN-only http://repo.lan/.
          cp -p "${{ steps.rpm.outputs.path }}" /srv/dnf-repo-public/
          restorecon -F "/srv/dnf-repo-public/${{ steps.rpm.outputs.name }}"
          createrepo_c --update --quiet /srv/dnf-repo-public
          echo "Published /srv/dnf-repo-public/${{ steps.rpm.outputs.name }}"

      # ---- GitHub Release ----
      - name: Create GitHub Release with RPM asset
        if: steps.version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            "${{ steps.rpm.outputs.path }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes-file RELEASE_NOTES.md

      - name: Generate job summary
        if: always()
        run: |
          VERSION=${{ steps.version.outputs.version }}
          TAG=${{ steps.version.outputs.tag }}
          SKIP=${{ steps.version.outputs.skip }}
          RPM=${{ steps.rpm.outputs.name }}
          {
            echo "## Release Summary"
            echo
            if [ "$SKIP" = "true" ]; then
              echo "> **Skipped** — no version change (already at v${VERSION})"
            else
              echo "| Item | Value |"
              echo "|------|-------|"
              echo "| **Version** | v${VERSION} |"
              echo "| **Tag** | \`${TAG}\` |"
              echo "| **Bump** | ${{ inputs.bump || 'auto-detected' }} |"
              echo "| **RPM** | \`${RPM}\` |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
