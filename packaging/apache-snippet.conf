# turf-tracker Apache reverse-proxy snippet.
#
# Required Apache modules (load via /etc/httpd/conf.modules.d/, or
# verify with `httpd -M`):
#   - mod_headers       (Header / RequestHeader directives below)
#   - mod_proxy         (ProxyPreserveHost, ProxyPass, ProxyPassReverse)
#   - mod_proxy_http    (HTTP-protocol backend for the ProxyPass)
# Additionally required by the example vhost in this file's preamble:
#   - mod_rewrite       (RewriteEngine / RewriteRule for the HTTP→HTTPS redirect)
#   - mod_ssl           (SSLEngine, SSLCertificateFile, etc.)
# Fedora 43's `httpd` package loads all five by default. A first-time
# operator on a stripped Apache install discovers missing modules via
# 500s with cryptic "Invalid command 'Header'" lines in error.log —
# this list is the cheaper path.
#
# Installed at /usr/share/turf-tracker/apache-snippet.conf (RPM-owned,
# read-only). NOT in /etc/httpd/conf.d/ — Apache doesn't auto-load
# this. The operator Includes it from inside their own <VirtualHost>
# block. Example /etc/httpd/conf.d/turf_tracker.conf:
#
#   <VirtualHost *:80>
#       ServerName turf.tylervigario.com
#       RewriteEngine on
#       RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [R=permanent,L]
#   </VirtualHost>
#
#   <VirtualHost *:443>
#       ServerName turf.tylervigario.com
#
#       ErrorLog  /var/log/httpd/turf-tracker-error.log
#       CustomLog /var/log/httpd/turf-tracker-access.log combined
#
#       SSLEngine on
#       SSLCertificateFile    /etc/letsencrypt/live/turf.tylervigario.com/fullchain.pem
#       SSLCertificateKeyFile /etc/letsencrypt/live/turf.tylervigario.com/privkey.pem
#       Include /etc/letsencrypt/options-ssl-apache.conf
#
#       Include /usr/share/turf-tracker/apache-snippet.conf
#   </VirtualHost>
#
# Domain name, TLS cert paths, log paths, and the www→apex redirect
# are all host-specific — the operator owns them. This snippet ships
# only the host-portable bits: security headers, static-asset cache
# headers, the service-worker no-cache rule, and the ProxyPass plumbing.
#
# Backend port: the snippet defaults to :3000, matching PORT= in the
# RPM-shipped /usr/lib/turf-tracker/default.env. To run turf-tracker
# on a different port (e.g. when another service on the same multi-
# app host already owns :3000 — vigario-website + pipetree both
# default there too), declare `Define BACKEND_PORT <port>` inside the
# <VirtualHost> BEFORE the Include, AND update PORT= in
# /etc/sysconfig/turf-tracker to match — the proxy target and the
# service-side bind must agree. BACKEND_PORT is scoped to the Include
# (the snippet UnDefines it on the way out, so a later vhost on the
# same host that Includes a different app's snippet starts from a
# clean slate); it's not available for use elsewhere in the vhost
# after the Include line.

Header always set X-Content-Type-Options "nosniff"
Header always set X-Frame-Options "SAMEORIGIN"
Header always set Referrer-Policy "strict-origin-when-cross-origin"
Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"

<LocationMatch "^/_next/static/">
    Header set Cache-Control "public, max-age=31536000, immutable"
</LocationMatch>

# Service worker must not be cached upstream — clients need every
# request to revalidate so a deployed sw.js update reaches them.
# next.config.ts already sets these headers, but pinning them at the
# proxy too prevents an intermediate cache from overriding.
<LocationMatch "^/sw\.js$">
    Header set Cache-Control "no-cache, no-store, must-revalidate"
</LocationMatch>

ProxyPreserveHost On
RequestHeader set X-Forwarded-Proto "https"
RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"

ProxyRequests Off

# Default BACKEND_PORT to 3000 unless the operator declared it inside
# the <VirtualHost> before the Include. Apache parses Define/UnDefine
# top-to-bottom at config-load time, so the operator's vhost-scope
# Define has already executed by the time this Include is processed —
# the <IfDefine !VAR> guard fires only when no override is present.
# Plain `Define BACKEND_PORT 3000` here would be wrong: it'd clobber
# the operator's value because Include runs after their lines in the
# same global scope.
<IfDefine !BACKEND_PORT>
    Define BACKEND_PORT 3000
</IfDefine>

ProxyPass / http://127.0.0.1:${BACKEND_PORT}/
ProxyPassReverse / http://127.0.0.1:${BACKEND_PORT}/

# Clear the global Define so a later vhost on the same host that
# Includes a different app's snippet starts from a clean slate
# instead of inheriting this vhost's value. Apache `Define` is
# globally scoped despite appearing inside <VirtualHost>; without
# this UnDefine, a multi-app operator's second-vhost-without-Define
# would silently proxy to whatever the first vhost set. ProxyPass
# above already captured the resolved value at parse time, so
# clearing the variable here doesn't affect the directives that
# consumed it.
UnDefine BACKEND_PORT
