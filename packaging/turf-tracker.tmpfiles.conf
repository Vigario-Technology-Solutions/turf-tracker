# State + cache + backup + runtime-lock directories.
#
# StateDirectory= and CacheDirectory= in the systemd unit also create
# the first two at unit-start; this file is a boot-ordering backstop
# (the units don't run until first start, but other things that read
# the dirs may not depend on the unit).
#
# /var/backups/turf-tracker is the canonical FHS home for backup
# tarballs. Permissions are 0700 root:root because the tarballs
# include the operator's sysconfig (AUTH_PASSWORD_PEPPER,
# BETTER_AUTH_SECRET) by default — the directory enforces the secrets
# discipline regardless of what the operator does with the tarballs
# after creation. preserve/ is the retention-safe subdir (operator's
# retention policy MUST exclude it; see docs/deployment.md "Backup /
# restore").
#
# /run/turf-tracker is the runtime-state dir (tmpfs, cleared at boot,
# recreated here). Currently only holds backup.lock for mutual
# exclusion between `turf backup` and `turf restore`. Both commands
# run as root via sudo, so 0700 root:root is correct.
#
#Type Path                                    Mode UID           Group         Age Argument
d     /var/lib/turf-tracker                   0750 turf-tracker  turf-tracker  -   -
d     /var/cache/turf-tracker                 0750 turf-tracker  turf-tracker  -   -
d     /var/backups/turf-tracker               0700 root          root          -   -
d     /var/backups/turf-tracker/preserve      0700 root          root          -   -
d     /run/turf-tracker                       0700 root          root          -   -
