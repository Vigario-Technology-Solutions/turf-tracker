# State + cache directories.
# StateDirectory=/CacheDirectory= in the unit create these on
# service start, but tmpfiles.d ownership lines act as a backstop if
# the unit ever runs as root or with a different DynamicUser= setup
# later. Postgres lives external to this app; the state dir here is
# for any local cache/secret the runtime writes (e.g. Better-Auth
# session-cache files, future image uploads).
d /var/lib/turf-tracker   0750 turf-tracker turf-tracker -
d /var/cache/turf-tracker 0750 turf-tracker turf-tracker -
