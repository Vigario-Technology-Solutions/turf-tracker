# State + cache + backup + runtime-lock directories.
#
# StateDirectory= and CacheDirectory= in the systemd unit also create
# the first two at unit-start; this file is a boot-ordering backstop
# (the units don't run until first start, but other things that read
# the dirs may not depend on the unit) AND it's how the branding/
# subdir under /var/lib gets pre-created independent of unit startup.
# branding/ specifically is the admin-uploadable target referenced by
# `turf brand:set --logo` — operators drop logo files there before
# brand:set wires them up. It needs to exist whether or not
# turf-tracker.service has ever run.
#
# /var/backups/turf-tracker is the canonical FHS home for backup
# tarballs. Permissions are 0700 turf-tracker:turf-tracker —
# tarballs include the operator's sysconfig (AUTH_PASSWORD_PEPPER,
# BETTER_AUTH_SECRET) by default, so the directory keeps tightly-
# scoped read/write. `turf backup` runs as the turf-tracker user
# (via the wrapper's group-readable sysconfig path) and writes here
# without root; operator-invoked `sudo turf backup` works too (root
# reads/writes anywhere). preserve/ is the retention-safe subdir
# (operator's retention policy MUST exclude it; see
# docs/deployment.md "Backup / restore").
#
# /run/turf-tracker is the runtime-state dir (tmpfs, cleared at
# boot, recreated here). Holds backup.lock for mutual exclusion
# between `turf backup` and `turf restore`. 0700 turf-tracker:
# turf-tracker fits both invocation paths.
#
#Type Path                                    Mode UID           Group         Age Argument
d     /var/lib/turf-tracker                   0750 turf-tracker  turf-tracker  -   -
d     /var/lib/turf-tracker/branding          0750 turf-tracker  turf-tracker  -   -
d     /var/cache/turf-tracker                 0750 turf-tracker  turf-tracker  -   -
d     /var/backups/turf-tracker               0700 turf-tracker  turf-tracker  -   -
d     /var/backups/turf-tracker/preserve      0700 turf-tracker  turf-tracker  -   -
d     /run/turf-tracker                       0700 turf-tracker  turf-tracker  -   -
