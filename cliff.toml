[changelog]
header = "# Changelog\n"
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}](https://github.com/Vigario-Technology-Solutions/turf-tracker/{% if previous.version %}compare/{{ previous.version }}...{{ version }}{% else %}releases/tag/{{ version }}{% endif %}) ({{ timestamp | date(format="%Y-%m-%d") }})

{% else %}\
## [Unreleased]

{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}\
### {{ group | striptags | trim }}

{% for commit in commits %}\
* {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{% if commit.breaking %}[**breaking**] {% endif %}{{ commit.message | upper_first }}
{% endfor %}
{% endfor %}\
"""
trim = true
render_always = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
protect_breaking_commits = false
filter_commits = true
topo_order = false
sort_commits = "oldest"
tag_pattern = "v[0-9].*"
commit_preprocessors = [
  { pattern = '\(#\d+\)', replace = "" },
]
# Active types (commitlint-enforced on new commits): feat, fix,
# refactor, docs, test, chore. The perf/style/revert/build/ci
# parsers exist to keep the regenerated changelog faithful to
# historical commits — they map into the active groupings.
commit_parsers = [
  { message = "^feat",     group = "<!-- 0 -->Features" },
  { message = "^fix",      group = "<!-- 1 -->Bug Fixes" },
  { message = "^refactor", group = "<!-- 2 -->Refactoring" },
  { message = "^perf",     group = "<!-- 2 -->Refactoring" },
  { message = "^style",    group = "<!-- 2 -->Refactoring" },
  { message = "^revert",   group = "<!-- 1 -->Bug Fixes" },
  { message = "^docs",     skip = true },
  { message = "^test",     skip = true },
  { message = "^chore",    skip = true },
  { message = "^build",    skip = true },
  { message = "^ci",       skip = true },
]

[bump]
features_always_bump_minor = true
breaking_always_bump_major = true
initial_tag = "v0.1.0"
